function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randFloat(min, max, step = 0.5) {
  return Math.round((Math.random() * (max - min) + min) / step) * step;
}

function randChoice(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString();
}

// ─────────────────────────────────────────
//  SQL.JS INIT
// ─────────────────────────────────────────

let db = null;

async function initDb() {
  const SQL = await initSqlJs({
    locateFile: () => `/sql-wasm.wasm`,
  });

  const saved = localStorage.getItem('hevy_db');
  if (saved) {
    const binary = atob(saved);
    const data = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      data[i] = binary.charCodeAt(i);
    }
    db = new SQL.Database(data);
  } else {
    // No existe BD — crear una nueva desde cero
    db = new SQL.Database();
    createMinimalSchema(db);
    seedMinimalExercises(db);
    saveDb();
    log('BD creada desde cero ✓');
  }
  return db;
}

function createMinimalSchema(database) {
  database.run(`
    CREATE TABLE IF NOT EXISTS exercises (
      id TEXT PRIMARY KEY,
      name TEXT NOT NULL,
      muscle_group TEXT NOT NULL,
      secondary_muscles TEXT DEFAULT '[]',
      equipment TEXT DEFAULT 'other',
      is_custom INTEGER DEFAULT 0,
      is_favorite INTEGER DEFAULT 0,
      created_at TEXT DEFAULT (datetime('now'))
    );
    CREATE TABLE IF NOT EXISTS routines (
      id TEXT PRIMARY KEY,
      name TEXT NOT NULL,
      description TEXT DEFAULT '',
      estimated_duration_minutes INTEGER,
      is_public INTEGER DEFAULT 0,
      created_at TEXT DEFAULT (datetime('now')),
      updated_at TEXT DEFAULT (datetime('now'))
    );
    CREATE TABLE IF NOT EXISTS routine_exercises (
      id TEXT PRIMARY KEY,
      routine_id TEXT NOT NULL,
      exercise_id TEXT NOT NULL,
      order_index INTEGER NOT NULL,
      target_sets INTEGER DEFAULT 3,
      target_reps TEXT DEFAULT '10',
      target_weight REAL,
      rest_seconds INTEGER DEFAULT 90,
      FOREIGN KEY (routine_id) REFERENCES routines(id) ON DELETE CASCADE,
      FOREIGN KEY (exercise_id) REFERENCES exercises(id)
    );
    CREATE TABLE IF NOT EXISTS workouts (
      id TEXT PRIMARY KEY,
      routine_id TEXT,
      name TEXT NOT NULL DEFAULT 'Workout',
      started_at TEXT NOT NULL,
      finished_at TEXT,
      duration_seconds INTEGER,
      notes TEXT DEFAULT '',
      is_public INTEGER DEFAULT 0,
      tags TEXT DEFAULT '[]',
      FOREIGN KEY (routine_id) REFERENCES routines(id)
    );
    CREATE TABLE IF NOT EXISTS workout_sets (
      id TEXT PRIMARY KEY,
      workout_id TEXT NOT NULL,
      exercise_id TEXT NOT NULL,
      set_number INTEGER NOT NULL,
      set_type TEXT DEFAULT 'normal',
      reps INTEGER NOT NULL,
      weight REAL DEFAULT 0,
      rpe REAL,
      notes TEXT DEFAULT '',
      completed_at TEXT DEFAULT (datetime('now')),
      rest_time INTEGER DEFAULT 0,
      FOREIGN KEY (workout_id) REFERENCES workouts(id) ON DELETE CASCADE,
      FOREIGN KEY (exercise_id) REFERENCES exercises(id)
    );
    CREATE TABLE IF NOT EXISTS workout_exercises (
      workout_id TEXT NOT NULL,
      exercise_id TEXT NOT NULL,
      notes TEXT DEFAULT '',
      order_index INTEGER DEFAULT 0,
      group_id TEXT DEFAULT '',
      PRIMARY KEY (workout_id, exercise_id)
    );
    CREATE TABLE IF NOT EXISTS personal_records (
      id TEXT PRIMARY KEY,
      exercise_id TEXT NOT NULL,
      type TEXT NOT NULL,
      value REAL NOT NULL,
      achieved_at TEXT NOT NULL,
      workout_id TEXT,
      FOREIGN KEY (exercise_id) REFERENCES exercises(id),
      FOREIGN KEY (workout_id) REFERENCES workouts(id)
    );
    CREATE TABLE IF NOT EXISTS body_weight (
      id TEXT PRIMARY KEY,
      weight REAL NOT NULL,
      recorded_at TEXT NOT NULL,
      photo TEXT,
      notes TEXT DEFAULT ''
    );
    CREATE INDEX IF NOT EXISTS idx_workout_sets_workout ON workout_sets(workout_id);
    CREATE INDEX IF NOT EXISTS idx_workout_sets_exercise ON workout_sets(exercise_id);
    CREATE INDEX IF NOT EXISTS idx_workouts_started ON workouts(started_at);
    CREATE INDEX IF NOT EXISTS idx_personal_records_exercise ON personal_records(exercise_id);
  `);
}

function saveDb() {
  if (!db) return;
  const data = db.export();
  // Use typed array loop instead of spread operator to avoid stack overflow
  let binary = '';
  for (let i = 0; i < data.length; i++) {
    binary += String.fromCharCode(data[i]);
  }
  localStorage.setItem('hevy_db', btoa(binary));
}

// ─────────────────────────────────────────
//  SEED
// ─────────────────────────────────────────

async function run() {
  const btn = document.getElementById('btn');
  const logEl = document.getElementById('log');
  logEl.classList.add('show');
  logEl.textContent = '';

  btn.disabled = true;
  btn.textContent = '⏳ Generando...';

  try {
    log('Iniciando sql.js...');
    await initDb();
    log('BD cargada ✓');

    const TOTAL_WORKOUTS = 550;
    const DAYS_SPAN = 730; // ~2 años

    // Get existing exercise IDs grouped by muscle
    const exByMuscle = {};
    for (const mg of MUSCLE_GROUPS) {
      const rows = db.exec(`SELECT id, name, equipment FROM exercises WHERE muscle_group = '${mg}'`);
      if (rows.length) {
        exByMuscle[mg] = rows[0].values.map(r => ({ id: r[0], name: r[1], equipment: r[2] }));
      }
    }
    log(`Ejercicios cargados: ${MUSCLE_GROUPS.map(mg => `${mg}=${exByMuscle[mg]?.length || 0}`).join(', ')}`);

    // ── 1. Crear rutinas ──────────────────────────────────────────────
    log('Creando rutinas...');
    const routineIds = {};
    for (const t of WORKOUT_TEMPLATES) {
      const routineId = generateId();
      const estimatedMins = randInt(45, 90);
      db.run(
        `INSERT OR IGNORE INTO routines (id, name, description, estimated_duration_minutes, is_public, created_at, updated_at)
         VALUES (?, ?, ?, ?, 0, datetime('now'), datetime('now'))`,
        [routineId, t.routine_name, `Rutina de ${t.muscles.join(', ')}`, estimatedMins]
      );
      routineIds[t.name] = routineId;

      // Añadir exercises a la rutina (2-3 por músculo)
      let orderIdx = 0;
      for (const muscle of t.muscles) {
        const available = exByMuscle[muscle];
        if (!available || available.length === 0) continue;
        const numEx = randInt(2, 3);
        const shuffled = [...available].sort(() => Math.random() - 0.5);
        for (const ex of shuffled.slice(0, numEx)) {
          const reId = generateId();
          db.run(
            `INSERT OR IGNORE INTO routine_exercises (id, routine_id, exercise_id, order_index, target_sets, target_reps, rest_seconds)
             VALUES (?, ?, ?, ?, ?, ?, ?)`,
            [reId, routineId, ex.id, orderIdx++, randInt(3, 5), `${randInt(8, 12)}`, randInt(90, 180)]
          );
        }
      }
    }
    log(`  ${Object.keys(routineIds).length} rutinas creadas ✓`);

    let workoutCount = db.exec('SELECT COUNT(*) FROM workouts')[0].values[0][0];
    let setCount = db.exec('SELECT COUNT(*) FROM workout_sets')[0].values[0][0];
    log(`Estado actual — workouts: ${workoutCount}, sets: ${setCount}`);

    // Start from roughly DAY 1 of history and go forward
    const today = new Date();

    for (let w = 0; w < TOTAL_WORKOUTS; w++) {
      // Distribute 550 workouts evenly over ~2 years (730 days) starting from oldest
      // Each workout occupies a slot; some slots are skipped (~15% rest days)
      const totalSlots = Math.ceil(DAYS_SPAN * (4 / 7)); // ~4 workouts per 7 days max
      const slotSize = DAYS_SPAN / TOTAL_WORKOUTS; // ~1.33 days per workout slot

      let daysBack = Math.floor(w * slotSize);
      // Add jitter: skip some slots randomly
      let skipCount = 0;
      while (daysBack >= DAYS_SPAN - 1 && skipCount < 50) {
        daysBack = Math.floor((w + skipCount) * slotSize) + randInt(0, 3);
        skipCount++;
      }
      if (daysBack >= DAYS_SPAN - 1) continue; // safety

      const workoutDate = new Date(today);
      workoutDate.setDate(workoutDate.getDate() - daysBack);
      workoutDate.setHours(randInt(7, 20), randInt(0, 59), 0, 0);

      const template = randChoice(WORKOUT_TEMPLATES);
      const duration = randInt(2700, 5400); // 45-90 min
      const startedAt = workoutDate.toISOString();
      const finishedAt = new Date(workoutDate.getTime() + duration * 1000).toISOString();
      const workoutId = generateId();
      const notes = randChoice(NOTES_TEMPLATES);
      const tags = JSON.stringify([template.name.toLowerCase()]);

      const routineId = routineIds[template.name] || null;
      db.run(
        `INSERT INTO workouts (id, routine_id, name, started_at, finished_at, duration_seconds, notes, is_public, tags)
         VALUES (?, ?, ?, ?, ?, ?, ?, 0, ?)`,
        [workoutId, routineId, template.name, startedAt, finishedAt, duration, notes, tags]
      );

      // Add exercises for each muscle group in template
      const exerciseOrderIdx = 0;
      for (const muscle of template.muscles) {
        const available = exByMuscle[muscle];
        if (!available || available.length === 0) continue;

        // Pick 2-4 exercises per muscle group
        const numExercises = randInt(2, 4);
        const shuffled = [...available].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, numExercises);

        for (const ex of selected) {
          const exOrderIdx = exerciseOrderIdx + template.muscles.indexOf(muscle);
          db.run(
            `INSERT OR IGNORE INTO workout_exercises (workout_id, exercise_id, notes, order_index, group_id)
             VALUES (?, ?, '', ?, '')`,
            [workoutId, ex.id, exOrderIdx]
          );

          // 3-5 sets per exercise
          const numSets = randInt(3, 5);
          const baseWeight = getBaseWeight(ex);
          const baseReps = getBaseReps(ex);

          for (let s = 0; s < numSets; s++) {
            const setId = generateId();
            const setType = s === 0 && Math.random() < 0.2 ? 'warmup'
                          : s === numSets - 1 && Math.random() < 0.15 ? 'drop'
                          : 'normal';

            // Weight varies slightly per set (progressive overload simulation)
            const setVariation = randFloat(-2.5, 5);
            const weight = Math.max(0, baseWeight + setVariation);
            const reps = Math.max(1, baseReps + randInt(-2, 2));
            const rpe = Math.random() < 0.6 ? randFloat(6, 10, 0.5) : null;

            db.run(
              `INSERT INTO workout_sets (id, workout_id, exercise_id, set_number, set_type, reps, weight, rpe, notes, completed_at, rest_time)
               VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
              [setId, workoutId, ex.id, s + 1, setType, reps, weight, rpe, '', startedAt, randInt(60, 180)]
            );
          }
        }
      }

      workoutCount++;
      if (w % 100 === 0) {
        log(`Progreso: ${w}/${TOTAL_WORKOUTS} workouts...`);
        saveDb();
      }
    }

    saveDb();
    log(`\n✅ SEEDING COMPLETADO`);
    log(`   ${workoutCount} workouts generados`);
    log(`   Guardado en localStorage ✓`);

    btn.textContent = '✅ Hecho';
    document.getElementById('btnClean').style.display = 'block';
    showStats();

  } catch (err) {
    log(`ERROR: ${err.message}`);
    btn.disabled = false;
    btn.textContent = '▶ Reintentar';
    console.error(err);
  }
}

function getBaseWeight(ex) {
  const eq = ex.equipment;
  if (eq === 'barbell') return randFloat(40, 120);
  if (eq === 'dumbbell') return randFloat(10, 40);
  if (eq === 'machine') return randFloat(30, 100);
  if (eq === 'cable') return randFloat(20, 60);
  return randFloat(10, 80);
}

function getBaseReps(ex) {
  return randInt(6, 12);
}

async function clean() {
  if (!confirm('¿Eliminar TODOS los datos de la app? Esta acción no se puede deshacer.')) return;
  localStorage.removeItem('hevy_db');
  location.reload();
}

// Expose to window so HTML onclick works
window.__seedRun = run;
window.__seedClean = clean;

// Init sql.js
const script = document.createElement('script');
script.src = '/sql-wasm.js';
script.onload = () => { document.getElementById('btn').disabled = false; };
document.head.appendChild(script);
</script>
